name: "⚡ Improve Existing Skill"
description: "Make an existing skill better — clearer triggers, better output, missing examples"
title: "[Improve] skill-name — "
labels: ["improvement", "good-first-issue"]
body:
  - type: input
    id: skill-name
    attributes:
      label: Skill name
      description: Exact folder name in `skills/`
      placeholder: e.g. security-audit, pr-review, a11y
    validations:
      required: true

  - type: dropdown
    id: improvement-type
    attributes:
      label: What needs improving?
      multiple: true
      options:
        - Trigger keywords are unclear
        - Description is vague
        - Missing usage examples
        - Output format could be better
        - Missing edge cases
        - Instructions are too long / could be split
        - Bug in a helper script
        - Other
    validations:
      required: true

  - type: textarea
    id: current-behaviour
    attributes:
      label: Current behaviour
      description: What does Claude do now when using this skill?
    validations:
      required: true

  - type: textarea
    id: desired-behaviour
    attributes:
      label: Desired behaviour
      description: What should it do instead?
    validations:
      required: true

  - type: textarea
    id: suggested-change
    attributes:
      label: Suggested change (optional)
      description: Paste the improved SKILL.md section if you have a draft
      render: markdown
